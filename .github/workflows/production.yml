name: Deploy (Cloudflare Workers)

# Deploys to https://template.thecodeorigin.com (Worker `nuxt-template`).
# The ONLY GitHub secret used is DOPPLER_TOKEN (a read-only Doppler service token
# scoped to project=template, config=prd). Everything else — including the Cloudflare
# credentials and all NUXT_* runtime vars — is pulled from Doppler at run time.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: Production
      url: https://template.thecodeorigin.com
    permissions:
      contents: write
    env:
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      DOPPLER_PROJECT: template
      DOPPLER_CONFIG: prd
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Resolve Cloudflare credentials from Doppler
        run: |
          CF_TOKEN="$(doppler secrets get CLOUDFLARE_TOKEN --plain)"
          CF_ACCOUNT="$(doppler secrets get CLOUDFLARE_ACCOUNT_ID --plain)"
          echo "::add-mask::$CF_TOKEN"
          echo "::add-mask::$CF_ACCOUNT"
          # wrangler reads CLOUDFLARE_API_TOKEN, not CLOUDFLARE_TOKEN.
          echo "CLOUDFLARE_API_TOKEN=$CF_TOKEN" >> "$GITHUB_ENV"
          echo "CLOUDFLARE_ACCOUNT_ID=$CF_ACCOUNT" >> "$GITHUB_ENV"

      - name: Build (Nuxt → cloudflare-module)
        # doppler run injects every prd var, so CLOUDFLARE_D1_DATABASE_ID,
        # CLOUDFLARE_KV_NAMESPACE_ID, etc. are available for the NuxtHub hub block
        # and NUXT_* vars bake with production values.
        run: doppler run -- pnpm build

      - name: Apply D1 migrations (remote)
        run: npx wrangler d1 migrations apply DB --remote --config .output/server/wrangler.json

      - name: Deploy Worker
        run: npx wrangler deploy --config .output/server/wrangler.json

      - name: Upsert Worker secrets (all Doppler vars except CF infra + metadata + wrangler vars)
        run: |
          doppler secrets download --no-file --format json \
            | jq 'with_entries(select(.key | test("^(CLOUDFLARE_|DOPPLER_)") | not))
                  | del(.NUXT_PUBLIC_BASE_DOMAIN, .NUXT_PUBLIC_SSL_ENABLED)' \
            > worker-secrets.json
          npx wrangler secret bulk worker-secrets.json --config .output/server/wrangler.json
          rm -f worker-secrets.json

      - name: Release (semantic-release)
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: '@semantic-release/exec'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
