name: Production

# Production deployment pipeline: Cloudflare Workers via wrangler.
#
# On push to main:
#   1. Build the Nuxt app with NITRO_PRESET=cloudflare-module targeting the
#      production Cloudflare bindings declared in nuxt.config.ts / wrangler.jsonc.
#      NuxtHub applies D1 migrations automatically during build
#      (applyMigrationsDuringBuild: true) — no separate migrate step needed.
#   2. Deploy the prebuilt output to Cloudflare Workers with wrangler deploy.
#
# Migration ordering: NuxtHub migrates before the Worker is live, so the
# deployed code always matches the current schema. The tradeoff (brief
# window running old code against new schema) is eliminated compared to
# the old Vercel/Neon post-deploy migration pattern.
#
# Required GitHub repository secrets:
#   CLOUDFLARE_API_TOKEN  — Cloudflare API token with Workers + D1 + KV + R2
#                           edit permissions (and workers_observability edit
#                           if observability logging is enabled)
#
# Required GitHub repository variables:
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account ID
#
# Removed (no longer needed after Vercel/Neon migration):
#   NEON_API_KEY, VERCEL_TOKEN, PROD_POSTGRES_URL
#   NEON_PROJECT_ID, VERCEL_PROJECT_ID, VERCEL_TEAM_ID

on:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight · Cloudflare connectivity
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Verify Cloudflare credentials and resources
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ vars.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ vars.CLOUDFLARE_KV_NAMESPACE_ID }}
          CLOUDFLARE_CACHE_NAMESPACE_ID: ${{ vars.CLOUDFLARE_CACHE_NAMESPACE_ID }}
          CLOUDFLARE_R2_BUCKET: ${{ vars.CLOUDFLARE_R2_BUCKET }}
        run: |
          FAILED=0
          cf_check() {
            local label="$1" path="$2" http
            http=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              "https://api.cloudflare.com/client/v4${path}")
            if [ "$http" = "200" ]; then
              echo "✅  $label"
            else
              echo "❌  $label (HTTP $http)"
              FAILED=1
            fi
          }
          cf_check "Token valid"        "/user/tokens/verify"
          cf_check "Account"            "/accounts/${CLOUDFLARE_ACCOUNT_ID}"
          cf_check "D1 database"        "/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database/${CLOUDFLARE_D1_DATABASE_ID}"
          cf_check "KV namespace"       "/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces/${CLOUDFLARE_KV_NAMESPACE_ID}"
          cf_check "Cache KV namespace" "/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces/${CLOUDFLARE_CACHE_NAMESPACE_ID}"
          cf_check "R2 bucket"          "/accounts/${CLOUDFLARE_ACCOUNT_ID}/r2/buckets/${CLOUDFLARE_R2_BUCKET}"
          exit $FAILED

  deploy:
    name: Build · deploy (production)
    needs: preflight
    runs-on: ubuntu-latest
    # Referencing an environment makes GitHub record a Deployment (in_progress →
    # success/failure) on every run, visible at the repo's /deployments tab and
    # under the "production" environment. `url` links the record to the live site.
    environment:
      name: Production
      url: https://template.thecodeorigin.com
    # contents: write lets semantic-release create the git tag + GitHub Release.
    permissions:
      contents: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      # fetch-depth: 0 gives semantic-release the full history + tags it needs
      # to compute the next version from conventional commits.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # NuxtHub generates .output/server/wrangler.json from the hub block in
      # nuxt.config.ts. Migrations are NOT applied during the build (the D1
      # binding isn't reachable from the build host), so we apply them
      # explicitly against the remote database after building, before deploy.
      - name: Build (cloudflare_module, production)
        env:
          NITRO_PRESET: cloudflare_module
          CLOUDFLARE_D1_DATABASE_ID: ${{ vars.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ vars.CLOUDFLARE_KV_NAMESPACE_ID }}
          CLOUDFLARE_CACHE_NAMESPACE_ID: ${{ vars.CLOUDFLARE_CACHE_NAMESPACE_ID }}
          CLOUDFLARE_R2_BUCKET: ${{ vars.CLOUDFLARE_R2_BUCKET }}
        run: pnpm build

      - name: Apply D1 migrations (remote)
        run: npx wrangler --cwd .output/server d1 migrations apply DB --remote

      - name: Deploy to Cloudflare Workers (production)
        run: npx wrangler --cwd .output deploy

      # Auto-version from conventional commits, cut a GitHub Release, and attach
      # the just-deployed .output as a downloadable, wrangler-deployable tarball
      # (see .releaserc.json). No release is created when there are no releasable
      # commits (feat / fix / perf / BREAKING CHANGE) since the last tag.
      - name: Release (semantic-release)
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: '@semantic-release/exec'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
