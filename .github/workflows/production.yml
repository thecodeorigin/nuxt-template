name: Production

# Production deployment pipeline driven by GitHub Actions (Vercel only hosts).
#
# On push to main:
#   1. Build with NITRO_PRESET=vercel using the project's production env.
#   2. Deploy the prebuilt artifact to Vercel as a production deployment.
#   3. Run drizzle migrations against the production Neon DB *only after*
#      the deploy succeeds. Keeps schema in lockstep with the deployed
#      artifact and avoids migrating on a failed deploy.
#
# Tradeoff: between step 2 and step 3 the production app is running
# against the previous schema. Safe for additive migrations (new tables
# / nullable columns); risky for renames or drops — use expand-contract
# for those.
#
# Required GitHub repository secrets:
#   VERCEL_TOKEN         — Vercel team token with project deploy access
#
# Required GitHub repository variables:
#   VERCEL_PROJECT_ID    — prj_lpbCXMg9y2A8jgWxfPFUZDUqbiPR
#   VERCEL_TEAM_ID       — team_QZiKbPEl7KVrSR7zzASaL770
#
# The production Postgres URL is read from .vercel/.env.production.local
# (populated by `vercel pull --environment=production`) — single source of
# truth, so migrations always run against the same DB the deployed app
# connects to.

on:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Migrate · build · deploy
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_TEAM_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel production project settings + env
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build (production)
        env:
          NITRO_PRESET: vercel
          # Force demo flags at build time so nuxt-security (which
          # hard-codes the Upstash rate-limiter) gets stripped from
          # the modules array in nuxt.config.ts. Without this, the
          # deployed bundle imports nuxt-security and crashes at
          # runtime with "[Upstash Redis] The 'url' parameter is
          # required" because the project env has empty values for
          # the Upstash REST URL/token in production.
          NUXT_DEMO_MODE: 'true'
          NUXT_PUBLIC_DEMO_MODE: 'true'
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy prebuilt artifact to production
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN --archive=tgz

      - name: Apply drizzle migrations to production Neon
        run: |
          set -a
          . .vercel/.env.production.local
          set +a
          # User-managed NUXT_POSTGRES_URL is sensitive (only available
          # at runtime); fall back to the Neon-Vercel integration's
          # unpooled URL, which IS exposed via `vercel pull`.
          # Unpooled is the right choice for migrations.
          export NUXT_POSTGRES_URL="${NUXT_POSTGRES_URL:-${POSTGRES_URL_NON_POOLING:-${DATABASE_URL_UNPOOLED:-$POSTGRES_URL}}}"
          export NUXT_POSTGRES_SSL=true
          pnpm db:migrate
