name: Production

# Production deployment pipeline: Cloudflare Workers via wrangler.
#
# On push to main:
#   1. Build the Nuxt app with NITRO_PRESET=cloudflare-module targeting the
#      production Cloudflare bindings declared in nuxt.config.ts / wrangler.jsonc.
#      NuxtHub applies D1 migrations automatically during build
#      (applyMigrationsDuringBuild: true) — no separate migrate step needed.
#   2. Deploy the prebuilt output to Cloudflare Workers with wrangler deploy.
#
# Migration ordering: NuxtHub migrates before the Worker is live, so the
# deployed code always matches the current schema. The tradeoff (brief
# window running old code against new schema) is eliminated compared to
# the old Vercel/Neon post-deploy migration pattern.
#
# Required GitHub repository secrets:
#   CLOUDFLARE_API_TOKEN  — Cloudflare API token with Workers + D1 + KV + R2
#                           edit permissions (and workers_observability edit
#                           if observability logging is enabled)
#
# Required GitHub repository variables:
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account ID
#
# Removed (no longer needed after Vercel/Neon migration):
#   NEON_API_KEY, VERCEL_TOKEN, PROD_POSTGRES_URL
#   NEON_PROJECT_ID, VERCEL_PROJECT_ID, VERCEL_TEAM_ID

on:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build · deploy (production)
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # NuxtHub generates .output/server/wrangler.json from the hub block in
      # nuxt.config.ts. Migrations are NOT applied during the build (the D1
      # binding isn't reachable from the build host), so we apply them
      # explicitly against the remote database after building, before deploy.
      - name: Build (cloudflare_module, production)
        env:
          NITRO_PRESET: cloudflare_module
          CLOUDFLARE_D1_DATABASE_ID: ${{ vars.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ vars.CLOUDFLARE_KV_NAMESPACE_ID }}
          CLOUDFLARE_CACHE_NAMESPACE_ID: ${{ vars.CLOUDFLARE_CACHE_NAMESPACE_ID }}
          CLOUDFLARE_R2_BUCKET: ${{ vars.CLOUDFLARE_R2_BUCKET }}
        run: pnpm build

      - name: Apply D1 migrations (remote)
        run: npx wrangler --cwd .output/server d1 migrations apply DB --remote

      - name: Deploy to Cloudflare Workers (production)
        run: npx wrangler --cwd .output deploy
