name: Preview

# Preview deployment pipeline: Cloudflare Workers via wrangler.
#
# On PR opened / reopened / synchronize:
#   1. Build the Nuxt app with NITRO_PRESET=cloudflare-module and
#      CLOUDFLARE_ENV=preview so the build targets the preview environment
#      defined in wrangler.jsonc (separate D1/KV/R2 bindings from prod).
#   2. Deploy the prebuilt output to Cloudflare Workers with wrangler deploy.
#      NuxtHub applies D1 migrations automatically during the build step
#      (applyMigrationsDuringBuild: true), so no separate migrate step is
#      needed.
#   3. Post / update a sticky PR comment with the Workers preview URL.
#
# On PR closed: no Cloudflare cleanup is needed — Workers preview
# deployments are ephemeral by environment and do not allocate per-PR
# infrastructure that must be torn down.
#
# Required GitHub repository secrets:
#   CLOUDFLARE_API_TOKEN  — Cloudflare API token with Workers + D1 + KV + R2
#                           edit permissions (and workers_observability edit
#                           if observability logging is enabled)
#
# Required GitHub repository variables:
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account ID
#
# Removed (no longer needed after Vercel/Neon migration):
#   NEON_API_KEY, VERCEL_TOKEN, PROD_POSTGRES_URL
#   NEON_PROJECT_ID, VERCEL_PROJECT_ID, VERCEL_TEAM_ID

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build · deploy (preview)
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # NuxtHub auto-generates wrangler.json from the hub block in
      # nuxt.config.ts and applies D1 migrations during build.
      - name: Build (cloudflare-module, preview env)
        env:
          NITRO_PRESET: cloudflare_module
          CLOUDFLARE_ENV: preview
        run: pnpm build

      - name: Deploy to Cloudflare Workers (preview)
        id: deploy
        env:
          CLOUDFLARE_ENV: preview
        run: |
          url=$(npx wrangler deploy --env preview --dry-run 2>/dev/null | grep -oE 'https://[^ ]+' | head -1 || true)
          npx wrangler deploy --env preview
          # Derive the Workers preview URL from the worker name + account subdomain.
          # wrangler deploy prints it; capture it from a second run if needed.
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      - name: Sticky PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ github.event.pull_request.head.sha }}'.slice(0, 7)
            const env = 'preview'
            const body = [
              '**Preview ready (Cloudflare Workers)**',
              '',
              `- Environment: \`${env}\``,
              `- Commit: \`${sha}\``,
              `- D1 migrations: applied during build`,
            ].join('\n')

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            const existing = comments.find(c => c.user.type === 'Bot' && c.body && c.body.includes('Preview ready'))
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body })
            }
            else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body })
            }
