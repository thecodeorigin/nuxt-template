name: Preview

# Preview pipeline: per-branch ephemeral D1 on Cloudflare Workers (the D1
# analogue of Neon branches — Cloudflare has no DB branching, so we create a
# fresh D1 per feature branch). `main` uses the fixed production resources
# (see production.yml); every other branch gets its own dynamic set here.
#
# On PR opened / reopened / synchronize:
#   1. Derive a slug from the branch name and create (idempotent) a per-branch
#      D1 database, capturing its id.
#   2. Build with that D1 id + the shared preview KV/CACHE/R2 ids — read by
#      nuxt.config.ts `$production.hub` via CLOUDFLARE_* env vars (Cloudflare has no
#      resource auto-association, so ids are injected at build time).
#   3. Apply D1 migrations to the fresh per-branch database.
#   4. Deploy a per-branch Worker (nuxt-template-<slug>) + sticky PR comment.
# On PR closed: delete the per-branch Worker and its D1 database.
#
# Required GitHub config:
#   secret CLOUDFLARE_API_TOKEN   (Workers + D1 + KV + R2 edit)
#   vars   CLOUDFLARE_ACCOUNT_ID,
#          CLOUDFLARE_PREVIEW_KV_NAMESPACE_ID, CLOUDFLARE_PREVIEW_CACHE_NAMESPACE_ID,
#          CLOUDFLARE_PREVIEW_R2_BUCKET
#
# NOTE: previews share one preview KV/CACHE/R2 set (only D1 is per-branch). For
# full per-branch isolation, create those per branch here too and tear them down.

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency:
  group: preview-${{ github.head_ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  preflight:
    name: Preflight · Cloudflare connectivity
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Verify Cloudflare credentials and resources
        env:
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ vars.CLOUDFLARE_PREVIEW_KV_NAMESPACE_ID }}
          CLOUDFLARE_CACHE_NAMESPACE_ID: ${{ vars.CLOUDFLARE_PREVIEW_CACHE_NAMESPACE_ID }}
          CLOUDFLARE_R2_BUCKET: ${{ vars.CLOUDFLARE_PREVIEW_R2_BUCKET }}
        run: |
          FAILED=0
          cf_check() {
            local label="$1" path="$2" http
            http=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              "https://api.cloudflare.com/client/v4${path}")
            if [ "$http" = "200" ]; then
              echo "✅  $label"
            else
              echo "❌  $label (HTTP $http)"
              FAILED=1
            fi
          }
          cf_check "Token valid"        "/user/tokens/verify"
          cf_check "Account"            "/accounts/${CLOUDFLARE_ACCOUNT_ID}"
          cf_check "KV namespace"       "/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces/${CLOUDFLARE_KV_NAMESPACE_ID}"
          cf_check "Cache KV namespace" "/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces/${CLOUDFLARE_CACHE_NAMESPACE_ID}"
          cf_check "R2 bucket"          "/accounts/${CLOUDFLARE_ACCOUNT_ID}/r2/buckets/${CLOUDFLARE_R2_BUCKET}"
          exit $FAILED

  deploy:
    name: Build · deploy (preview)
    needs: preflight
    environment:
      name: Preview
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      # Derive Cloudflare resource names from the branch (lowercased, non
      # alphanumerics -> '-', capped at 40 chars). BRANCH is passed via env to
      # avoid shell injection from the ref name.
      - name: Resolve resource names from branch
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          SLUG=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//' | cut -c1-40 | sed -E 's/-+$//')
          echo "SLUG=$SLUG" >> "$GITHUB_ENV"
          echo "DB_NAME=nuxt-template-preview-$SLUG" >> "$GITHUB_ENV"
          echo "WORKER_NAME=nuxt-template-$SLUG" >> "$GITHUB_ENV"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Create the per-branch D1 (idempotent: `create` fails if it already
      # exists on a re-run, so we resolve the id from `d1 info` either way).
      - name: Create / resolve per-branch D1 database
        id: d1
        run: |
          npx --yes wrangler d1 create "$DB_NAME" || echo "D1 exists, reusing"
          DB_ID=$(npx --yes wrangler d1 info "$DB_NAME" --json | jq -r '.uuid')
          test -n "$DB_ID" && echo "id=$DB_ID" >> "$GITHUB_OUTPUT"

      - name: Build (cloudflare_module, preview)
        env:
          NITRO_PRESET: cloudflare_module
          CLOUDFLARE_D1_DATABASE_ID: ${{ steps.d1.outputs.id }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ vars.CLOUDFLARE_PREVIEW_KV_NAMESPACE_ID }}
          CLOUDFLARE_CACHE_NAMESPACE_ID: ${{ vars.CLOUDFLARE_PREVIEW_CACHE_NAMESPACE_ID }}
          CLOUDFLARE_R2_BUCKET: ${{ vars.CLOUDFLARE_PREVIEW_R2_BUCKET }}
        run: pnpm build

      # The generated .output/server/wrangler.json now points the DB binding at
      # the per-branch database, so this migrates that fresh database.
      - name: Apply D1 migrations to the per-branch database
        run: npx --yes wrangler --cwd .output/server d1 migrations apply DB --remote

      - name: Deploy per-branch Worker
        id: deploy
        run: |
          out=$(npx --yes wrangler --cwd .output deploy --name "$WORKER_NAME" 2>&1)
          echo "$out"
          url=$(echo "$out" | grep -oE 'https://[a-z0-9.-]+workers\.dev' | head -1)
          echo "url=$url" >> "$GITHUB_OUTPUT"

      # Each Worker has its own secrets, so the per-branch preview Worker needs
      # its own runtime config. NUXT_PUBLIC_BASE_DOMAIN / NUXT_PUBLIC_SSL_ENABLED
      # are already supplied as plaintext `vars` by wrangler.jsonc and baked into
      # the deployed Worker — a binding name can't be both a var and a secret
      # (Cloudflare API error 10053), so we must NOT re-set them here. Previews
      # inherit the production base domain (only used by non-request contexts like
      # cron email links; OAuth redirects derive from the live request) and SSL=true.
      # This step sets only the genuinely secret / preview-specific values:
      # - NUXT_AUTH_SECRET       — shared preview secret (stable so sessions survive re-deploys)
      # - NUXT_DEMO_MODE / NUXT_PUBLIC_DEMO_MODE — keep the demo login enabled on previews.
      - name: Provision preview Worker secrets
        env:
          PREVIEW_NUXT_AUTH_SECRET: ${{ secrets.PREVIEW_NUXT_AUTH_SECRET }}
        run: |
          cat > "$RUNNER_TEMP/preview-secrets.json" <<EOF
          {
            "NUXT_AUTH_SECRET": "${PREVIEW_NUXT_AUTH_SECRET}",
            "NUXT_DEMO_MODE": "true",
            "NUXT_PUBLIC_DEMO_MODE": "true"
          }
          EOF
          npx --yes wrangler secret bulk "$RUNNER_TEMP/preview-secrets.json" --name "$WORKER_NAME"

      - name: Sticky PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}'
            const sha = '${{ github.event.pull_request.head.sha }}'.slice(0, 7)
            const body = [
              '**Preview ready (Cloudflare Workers)**',
              '',
              url ? `- URL: ${url}` : `- Worker: \`${{ env.WORKER_NAME }}\``,
              `- D1: \`${{ env.DB_NAME }}\` (ephemeral, migrated)`,
              `- Commit: \`${sha}\``,
            ].join('\n')
            const { data: comments } = await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number })
            const existing = comments.find(c => c.user.type === 'Bot' && c.body && c.body.includes('Preview ready'))
            if (existing)
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body })
            else
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body })

  cleanup:
    name: Tear down preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve resource names from branch
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          SLUG=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//' | cut -c1-40 | sed -E 's/-+$//')
          echo "DB_NAME=nuxt-template-preview-$SLUG" >> "$GITHUB_ENV"
          echo "WORKER_NAME=nuxt-template-$SLUG" >> "$GITHUB_ENV"

      - name: Delete per-branch Worker
        run: npx --yes wrangler delete "$WORKER_NAME" --force || true

      - name: Delete per-branch D1 database
        run: npx --yes wrangler d1 delete "$DB_NAME" -y || true
