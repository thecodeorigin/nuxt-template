name: Preview

# Preview pipeline: per-PR ephemeral D1 on Cloudflare Workers (the D1 analogue
# of the old Neon-branch-per-PR setup — Cloudflare has no DB branching, so we
# create a fresh D1 database per PR).
#
# On PR opened / reopened / synchronize:
#   1. Create (idempotent) a per-PR D1 database and capture its id.
#   2. Build with that D1 id + the shared preview KV/CACHE/R2 ids — these are
#      read by nuxt.config.ts `$production.hub` via CF_* env vars (Cloudflare has
#      no resource auto-association, so ids are injected at build time).
#   3. Apply D1 migrations to the fresh per-PR database.
#   4. Deploy a per-PR Worker (nuxt-template-pr-<N>) + sticky PR comment.
# On PR closed: delete the per-PR Worker and its D1 database.
#
# Required GitHub config:
#   secret CLOUDFLARE_API_TOKEN   (Workers + D1 + KV + R2 edit)
#   vars   CLOUDFLARE_ACCOUNT_ID,
#          CF_PREVIEW_KV_NAMESPACE_ID, CF_PREVIEW_CACHE_NAMESPACE_ID,
#          CF_PREVIEW_R2_BUCKET
#
# NOTE: previews share one preview KV/CACHE/R2 set (only D1 is per-PR). For full
# per-PR isolation, create those per PR here too and tear them down on close.
# This workflow has not yet run against a real PR — validate the first one.

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
  DB_NAME: nuxt-template-preview-pr-${{ github.event.pull_request.number }}
  WORKER_NAME: nuxt-template-pr-${{ github.event.pull_request.number }}

jobs:
  deploy:
    name: Build · deploy (preview)
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Create the per-PR D1 (idempotent: `create` fails if it already exists on
      # a re-run, so we resolve the id from `d1 info` either way).
      - name: Create / resolve per-PR D1 database
        id: d1
        run: |
          npx --yes wrangler d1 create "$DB_NAME" || echo "D1 exists, reusing"
          DB_ID=$(npx --yes wrangler d1 info "$DB_NAME" --json | jq -r '.uuid')
          test -n "$DB_ID" && echo "id=$DB_ID" >> "$GITHUB_OUTPUT"

      - name: Build (cloudflare_module, preview)
        env:
          NITRO_PRESET: cloudflare_module
          CF_D1_DATABASE_ID: ${{ steps.d1.outputs.id }}
          CF_KV_NAMESPACE_ID: ${{ vars.CF_PREVIEW_KV_NAMESPACE_ID }}
          CF_CACHE_NAMESPACE_ID: ${{ vars.CF_PREVIEW_CACHE_NAMESPACE_ID }}
          CF_R2_BUCKET: ${{ vars.CF_PREVIEW_R2_BUCKET }}
        run: pnpm build

      # The generated .output/server/wrangler.json now points the DB binding at
      # the per-PR database, so this migrates that fresh database.
      - name: Apply D1 migrations to the per-PR database
        run: npx --yes wrangler --cwd .output/server d1 migrations apply DB --remote

      - name: Deploy per-PR Worker
        id: deploy
        run: |
          out=$(npx --yes wrangler --cwd .output deploy --name "$WORKER_NAME" 2>&1)
          echo "$out"
          url=$(echo "$out" | grep -oE 'https://[a-z0-9.-]+workers\.dev' | head -1)
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Sticky PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}'
            const sha = '${{ github.event.pull_request.head.sha }}'.slice(0, 7)
            const body = [
              '**Preview ready (Cloudflare Workers)**',
              '',
              url ? `- URL: ${url}` : `- Worker: \`${{ env.WORKER_NAME }}\``,
              `- D1: \`${{ env.DB_NAME }}\` (ephemeral, migrated)`,
              `- Commit: \`${sha}\``,
            ].join('\n')
            const { data: comments } = await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number })
            const existing = comments.find(c => c.user.type === 'Bot' && c.body && c.body.includes('Preview ready'))
            if (existing)
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body })
            else
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body })

  cleanup:
    name: Tear down preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete per-PR Worker
        run: npx --yes wrangler delete --name "$WORKER_NAME" || true

      - name: Delete per-PR D1 database
        run: npx --yes wrangler d1 delete "$DB_NAME" -y || true
