services:
  postgres:
    container_name: nuxt-template-pg
    image: postgres:latest
    volumes:
      - ./.docker/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-15432}
    ports:
      - '${POSTGRES_PORT:-15432}:5432'
    restart: unless-stopped

  redis:
    container_name: nuxt-template-redis
    image: redis:latest
    volumes:
      - ./.docker/redis:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis}
    ports:
      - '${REDIS_PORT:-16379}:6379'
    restart: unless-stopped

  redisinsight:
    image: redis/redisinsight:latest
    container_name: nuxt-template-redisinsight
    ports:
      - '${REDISINSIGHT_PORT:-15540}:5540'
    restart: unless-stopped

  mondodb:
    container_name: nuxt-template-mongodb
    image: mongo:latest
    volumes:
      - ./.docker/mongodb:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
    ports:
      - '${MONGO_PORT:-37017}:27017'
    restart: unless-stopped

  mailhog:
    container_name: nuxt-template-mailhog
    image: mailhog/mailhog:latest
    volumes:
      - ./.docker/mailhog:/data
    ports:
      - '${SMTP_PORT:-11025}:1025' # SMTP server port
      - '${SMTP_WEB_PORT:-18025}:8025' # Web UI port
    restart: unless-stopped
